<head>

  <title>Yingshuo Tao</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { display: grid; min-height: 100vh; margin: 0; place-items: center; }
    main { box-sizing: border-box; max-width: 44rem; padding: 2rem; width: 100%; }
    h1 { margin-bottom: .35rem; }
    p { line-height: 1.55; }
    nav { display: grid; gap: 1rem; margin-top: 2rem; }
    a { border: 1px solid currentColor; border-radius: .75rem; color: inherit; padding: 1.1rem 1.25rem; text-decoration: none; }
    a:hover, a:focus-visible { background: CanvasText; color: Canvas; }
    strong, span { display: block; }
    span { margin-top: .25rem; opacity: .75; }
  </style>
</head>

  <main>
    <h1>Yingshuo Tao</h1>
    <p>Choose a project.</p>
    <nav aria-label="Projects">

      <a href="/minesweeper/"><strong>Minesweeper</strong><span>Play the classic puzzle game.</span></a>
